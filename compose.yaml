# Canonical compose file. Dockge looks for `compose.yaml` first.
#
# Default behaviour: `docker compose up` pulls pre-built images from GHCR
# (no source-tree clone needed — set IMAGE_TAG to pin a version).
# Local dev: `docker compose up --build` re-uses the same `image:` names but
# builds from the local source tree.
#
# All env vars have safe defaults so the stack runs without a `.env` file.

services:
  backend:
    image: ghcr.io/imcmurray/pdf-to-djvu-converter-backend:${IMAGE_TAG:-latest}
    # `build:` is only consulted when you pass `--build` (or the image isn't
    # cached locally and pull fails). Keeps dev / prod paths identical.
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pdf2djvu-backend
    pull_policy: ${PULL_POLICY:-missing}
    environment:
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-100}
      CONVERSION_TIMEOUT: ${CONVERSION_TIMEOUT:-600}
      STORAGE_DIR: ${STORAGE_DIR:-/tmp/pdf2djvu}
      STORAGE_TTL_SECONDS: ${STORAGE_TTL_SECONDS:-3600}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      RATE_LIMIT_CONVERT: ${RATE_LIMIT_CONVERT:-30/hour}
      RATE_LIMIT_COMPARE: ${RATE_LIMIT_COMPARE:-60/hour}
      OCR_LANGUAGE: ${OCR_LANGUAGE:-eng}
      OCR_ENGINE: ${OCR_ENGINE:-auto}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - pdf2djvu-storage:/tmp/pdf2djvu
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "dockge.app=pdf2djvu"
      - "dockge.role=backend"

  frontend:
    image: ghcr.io/imcmurray/pdf-to-djvu-converter-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-}
    container_name: pdf2djvu-frontend
    pull_policy: ${PULL_POLICY:-missing}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    restart: unless-stopped
    labels:
      - "dockge.app=pdf2djvu"
      - "dockge.role=frontend"

volumes:
  pdf2djvu-storage:
    name: pdf2djvu-storage
