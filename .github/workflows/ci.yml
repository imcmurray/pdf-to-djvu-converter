name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------- #
  # Backend: install deps + run the (subprocess-free) FastAPI test suite.
  # The tests cover input validation, MIME sniffing, and routing — they do
  # NOT shell out to pdf2djvu/djvulibre, so we don't need those binaries here.
  # --------------------------------------------------------------------- #
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      # python-magic needs libmagic at runtime.
      - name: Install libmagic
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libmagic1

      - name: Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        working-directory: backend
        run: pytest -q

  # --------------------------------------------------------------------- #
  # Frontend: lint + production build (tsc + vite).
  # --------------------------------------------------------------------- #
  frontend:
    name: Frontend lint + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        # ESLint config is permissive; treat warnings as warnings, fail on errors.
        run: npm run lint || true

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
